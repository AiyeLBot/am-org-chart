<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accounts Management Org Chart — MallPlus</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 60px;
    }

    header {
      margin-bottom: 36px;
      text-align: center;
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a2e4a;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    header p {
      font-size: 0.8rem;
      color: #7a8ea0;
      margin-top: 4px;
    }

    .legend {
      display: flex;
      gap: 28px;
      margin-top: 32px;
      font-size: 0.75rem;
      color: #5a7089;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-solid {
      width: 36px;
      height: 2px;
      background: #b0c4de;
    }

    .legend-dotted {
      width: 36px;
      height: 0;
      border-top: 2px dashed #b0c4de;
    }

    .legend-dashed-red {
      width: 36px;
      height: 0;
      border-top: 2px dashed #dc2626;
    }

    .legend-red-text {
      color: #dc2626;
      font-weight: 600;
    }

    footer {
      margin-top: 28px;
      font-size: 0.72rem;
      color: #a0b0c0;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Accounts Management Team</h1>
  <p>MallPlus &nbsp;·&nbsp; FinCom Technologies Inc.</p>
</header>

<svg
  viewBox="0 0 960 520"
  width="100%"
  style="max-width:1000px; display:block;"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Segoe UI', Arial, sans-serif"
>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.11)"/>
    </filter>
  </defs>

  <!-- ═══════════════════════════════════════ -->
  <!--  DIRECTOR — Mhike Estipular            -->
  <!--  Mall Teal #00AFA0                    -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="360" y="28" width="240" height="68" rx="12" fill="#00AFA0" filter="url(#shadow)"/>
  <text x="480" y="54"  text-anchor="middle" fill="white" font-weight="700" font-size="15">Mhike Estipular</text>
  <text x="480" y="72"  text-anchor="middle" fill="white" font-size="11" opacity="0.75">Director</text>
  <text x="480" y="87"  text-anchor="middle" fill="white" font-size="11" opacity="0.75">Accounts Management</text>

  <!-- V-line: Director → fork -->
  <line x1="480" y1="96" x2="480" y2="128" stroke="#b0c4de" stroke-width="2"/>

  <!-- H-bar: Sally (center=240) → Mergel (center=720) -->
  <line x1="240" y1="128" x2="720" y2="128" stroke="#b0c4de" stroke-width="2"/>

  <!-- V-line down to Sally -->
  <line x1="240" y1="128" x2="240" y2="158" stroke="#b0c4de" stroke-width="2"/>

  <!-- V-line down to Mergel (longer — lower level) -->
  <line x1="720" y1="128" x2="720" y2="218" stroke="#b0c4de" stroke-width="2"/>


  <!-- ═══════════════════════════════════════ -->
  <!--  SALLY — Category Manager             -->
  <!--  Lighter teal #26C0B0                 -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="135" y="158" width="210" height="72" rx="12" fill="#26C0B0" filter="url(#shadow)"/>
  <text x="240" y="184" text-anchor="middle" fill="white" font-weight="700" font-size="14">Sally Gardose</text>
  <text x="240" y="201" text-anchor="middle" fill="white" font-size="10.5" opacity="0.9">Category Manager</text>
  <text x="240" y="218" text-anchor="middle" fill="white" font-size="10"   opacity="0.80">FA, FMCG, LS/GM</text>


  <!-- ═══════════════════════════════════════ -->
  <!--  MERGEL — Jr. Category Manager        -->
  <!--  Lightest teal #4DD0C0                -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="615" y="218" width="210" height="72" rx="12" fill="#4DD0C0" filter="url(#shadow)"/>
  <text x="720" y="244" text-anchor="middle" fill="white" font-weight="700" font-size="14">Mergel Romero</text>
  <text x="720" y="261" text-anchor="middle" fill="white" font-size="10.5" opacity="0.9">Jr. Category Manager</text>
  <text x="720" y="278" text-anchor="middle" fill="white" font-size="10"   opacity="0.80">EL &amp; HA</text>


  <!-- ═══════════════════════════════════════════════════ -->
  <!--  DOTTED LINE: Sally → Mergel                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <path
    d="M345,194 L480,194 L480,254 L615,254"
    fill="none"
    stroke="#b0c4de"
    stroke-width="2"
    stroke-dasharray="6,4"
  />
  <polygon points="615,254 607,250 607,258" fill="#b0c4de"/>


  <!-- ═══════════════════════════════════════ -->
  <!--  AMs UNDER SALLY                      -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="240" y1="230" x2="240" y2="262" stroke="#b0c4de" stroke-width="2"/>
  <line x1="90" y1="262" x2="390" y2="262" stroke="#b0c4de" stroke-width="2"/>
  <line x1="90" y1="262" x2="90" y2="380" stroke="#b0c4de" stroke-width="2"/>
  <line x1="240" y1="262" x2="240" y2="380" stroke="#b0c4de" stroke-width="2"/>
  <line x1="390" y1="262" x2="390" y2="380" stroke="#b0c4de" stroke-width="2"/>

  <!-- Sally AM1 — [TBH] Fashion -->
  <rect x="25" y="380" width="130" height="68" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="90" y="404" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">[TBH]</text>
  <text x="90" y="419" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="90" y="435" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Fashion</text>

  <!-- Sally AM2 — [TBH] FMCG -->
  <rect x="175" y="380" width="130" height="68" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="240" y="404" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">[TBH]</text>
  <text x="240" y="419" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="240" y="435" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">FMCG</text>

  <!-- Sally AM3 — Andrei Bautista Lifestyle -->
  <rect x="325" y="380" width="130" height="68" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="390" y="404" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="12">Andrei Bautista</text>
  <text x="390" y="419" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="390" y="435" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Lifestyle</text>


  <!-- ═══════════════════════════════════════ -->
  <!--  AMs UNDER MERGEL                     -->
  <!-- ═══════════════════════════════════════ -->
  <line x1="720" y1="290" x2="720" y2="320" stroke="#b0c4de" stroke-width="2"/>
  <line x1="570" y1="320" x2="870" y2="320" stroke="#b0c4de" stroke-width="2"/>
  <line x1="570" y1="320" x2="570" y2="380" stroke="#b0c4de" stroke-width="2"/>
  <line x1="720" y1="320" x2="720" y2="380" stroke="#b0c4de" stroke-width="2"/>
  <line x1="870" y1="320" x2="870" y2="380" stroke="#b0c4de" stroke-width="2"/>

  <!-- Mergel AM1 — Carlo Meguizo — Electronics -->
  <rect x="505" y="380" width="130" height="68" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="570" y="404" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="12">Carlo Meguizo</text>
  <text x="570" y="419" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="570" y="435" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Electronics</text>

  <!-- Mergel AM2 — [TBH] — Electronics -->
  <rect x="655" y="380" width="130" height="68" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" stroke-dasharray="6,3" filter="url(#shadow)"/>
  <text x="720" y="404" text-anchor="middle" fill="#dc2626" font-weight="700" font-size="12">[TBH]</text>
  <text x="720" y="419" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="720" y="435" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Electronics</text>

  <!-- Mergel AM3 — Jon Dexter Jacob — Home Appliances -->
  <rect x="805" y="380" width="130" height="68" rx="10" fill="white" stroke="#bfd3f5" stroke-width="2" filter="url(#shadow)"/>
  <text x="870" y="404" text-anchor="middle" fill="#2563eb" font-weight="700" font-size="12">Jon Dexter Jacob</text>
  <text x="870" y="419" text-anchor="middle" fill="#5a7089" font-size="10">Account Manager</text>
  <text x="870" y="435" text-anchor="middle" fill="#5a7089" font-size="10" opacity="0.8">Home Appliances</text>

</svg>

<!-- Legend -->
<div class="legend">
  <div class="legend-item">
    <div class="legend-solid"></div>
    <span>Direct reporting line</span>
  </div>
  <div class="legend-item">
    <div class="legend-dotted"></div>
    <span>Functional authority (Sally → Mergel)</span>
  </div>
  <div class="legend-item">
    <div class="legend-dashed-red"></div>
    <span class="legend-red-text">To be hired</span>
  </div>
</div>

<footer>
  MallPlus &nbsp;·&nbsp; Accounts Management &nbsp;·&nbsp; July 2026
</footer>

</body>
</html>
